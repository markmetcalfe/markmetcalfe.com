name: Deploy API Workers

on:
  pull_request:
    branches:
      - main
    paths:
      - 'api/**'
      - 'shared/**'
      - '.github/workflows/deploy-api.yml'
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'shared/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  # Lists workers with changes in this PR (or the latest commit on push), so only
  # those get deployed. If the workflow file or shared/** changed, all workers are listed.
  get-workers:
    name: Get Workers
    runs-on: ubuntu-latest
    outputs:
      workers: ${{ steps.list.outputs.workers }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: List changed workers
        id: list
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            changed=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")
          else
            changed=$(git diff --name-only HEAD^ HEAD)
          fi
          all_workers=$(find api -mindepth 2 -maxdepth 2 -name 'wrangler.jsonc' | cut -d'/' -f2 | sort)
          if echo "$changed" | grep -qE "^(\.github/workflows/deploy-api\.yml|shared/)"; then
            workers=$(echo "$all_workers" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            workers=$(echo "$all_workers" | while read -r worker; do
              echo "$changed" | grep -q "^api/$worker/" && echo "$worker"
            done | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi
          echo "workers=$workers" >> "$GITHUB_OUTPUT"

  deploy-worker:
    name: ${{ github.event_name == 'pull_request' && 'Dry Run' || 'Deploy' }} ${{ matrix.worker }} Worker
    runs-on: ubuntu-latest
    needs: get-workers
    strategy:
      matrix:
        worker: ${{ fromJson(needs.get-workers.outputs.workers) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: api
          command: deploy --config ${{ matrix.worker }}/wrangler.jsonc${{ github.event_name == 'pull_request' && ' --dry-run' || '' }}

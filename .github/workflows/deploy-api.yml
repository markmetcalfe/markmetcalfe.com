name: Deploy API Workers

on:
  push:
    branches:
      - main

jobs:
  get-workers:
    name: Get Workers
    runs-on: ubuntu-latest
    outputs:
      workers: ${{ steps.list.outputs.workers }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: List workers
        id: list
        run: |
          workers=$(find api -mindepth 2 -maxdepth 2 -name 'wrangler.jsonc' | cut -d'/' -f2 | sort | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "workers=$workers" >> "$GITHUB_OUTPUT"

  deploy-worker:
    name: Deploy ${{ matrix.worker }} Worker
    runs-on: ubuntu-latest
    needs: get-workers
    strategy:
      matrix:
        worker: ${{ fromJson(needs.get-workers.outputs.workers) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci
        working-directory: api

      - name: Deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: api
          command: deploy --config ${{ matrix.worker }}/wrangler.jsonc

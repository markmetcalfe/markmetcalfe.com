name: Build and Test web

on:
  pull_request:
    branches:
      - main
    paths:
      - 'web/**'
      - '.github/workflows/build-web.yml'
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - '.github/workflows/build-web.yml'

jobs:
  build:
    name: Build and lint the web project
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        name: Set up Node.js
        with:
          node-version: 22
      
      - name: Install dependencies
        run: npm ci
        working-directory: web
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install API dependencies
        run: npm ci
        working-directory: api

      - name: Lint the code
        run: npm run lint
        working-directory: web

      - name: Type-check the code
        run: npm run typecheck
        working-directory: web

      - name: Build the project
        run: npm run build
        working-directory: web

  playwright:
    name: Playwright E2E Tests
    needs: build
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        name: Set up Node.js
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci
        working-directory: web
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install Playwright
        run: npm exec playwright install
        working-directory: web

      - name: Run Playwright tests
        run: CI=1 npm run test
        working-directory: web

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: test-results
          path: |
            web/playwright-report/
            web/test-results/
          retention-days: 7

      - name: Run Chromatic
        uses: chromaui/action@d92ea1ce501f70e8c34745b2c7888648150a368a # v17.2.0
        with:
          workingDir: web
          playwright: true
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: true
          autoAcceptChanges: ${{ github.event_name == 'push' }}
        env:
          CHROMATIC_ARCHIVE_LOCATION: ./test-results
